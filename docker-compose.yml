services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - redis

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A workers.celery_app worker --loglevel=info -Q default,parse,rewrite,apply,alerts
    volumes:
      - ./backend:/app
      - ./workers:/app/workers
    env_file:
      - .env
    depends_on:
      - redis

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A workers.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler
    volumes:
      - ./backend:/app
      - ./workers:/app/workers
    env_file:
      - .env
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:

services:
  # Redis must start first
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Backend depends on Redis
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Worker depends on Redis and backend
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A workers.celery_app worker --loglevel=info -Q default,parse,rewrite,apply,alerts
    volumes:
      - ./backend:/app
      - ./workers:/app/workers
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy

  # Beat depends on Redis and backend
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A workers.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler
    volumes:
      - ./backend:/app
      - ./workers:/app/workers
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy

  # Frontend depends on backend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - frontend/.env
    environment:
      - NODE_ENV=development
    depends_on:
      - backend

volumes:
  redis_data:
